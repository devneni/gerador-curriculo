<!doctype html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gerador de Currículo</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<button id="tema" class="botao-tema">🌙</button>

<main class="container">

  <section class="forms">

    <h1>Gerador de Currículo</h1>

    <div class="progress">
      <div id="barraProgresso"></div>
    </div>

    <form>
      <label for="inputNome">Nome</label>
      <input id="inputNome" class="inputstyle" type="text" placeholder="Nome">

      <label for="inputCargo">Cargo desejado</label>
      <input id="inputCargo" class="inputstyle" type="text" placeholder="Cargo desejado">

      <label for="inputLinkedin">LinkedIn</label>
      <input id="inputLinkedin" class="inputstyle" type="url" placeholder="LinkedIn">

      <label for="inputGitHub">GitHub</label>
      <input id="inputGitHub" class="inputstyle" type="url" placeholder="GitHub">

      <label for="inputEmail">Email</label>
      <input id="inputEmail" class="inputstyle" type="email" placeholder="Email">

      <label for="inputNumero">Telefone</label>
      <input id="inputNumero" class="inputstyle" type="tel" placeholder="Telefone">

      <label for="inputTecnologias">Tecnologias</label>
      <input id="inputTecnologias" class="inputstyle" type="text" placeholder="Tecnologias (React, Node, JS)">

      <label for="inputExperiencia">Experiência</label>
      <input id="inputExperiencia" class="inputstyle" type="text" placeholder="Experiência">

      <label for="inputCursos">Cursos</label>
      <input id="inputCursos" class="inputstyle" type="text" placeholder="Cursos (Ex: Udemy - React - 40h)">

      <label for="inputFormacao">Formação Acadêmica</label>
      <input id="inputFormacao" class="inputstyle" type="text" placeholder="Formação Acadêmica (Ex: Universidade - Curso - Período)">

      <button type="button" id="addExp">Adicionar experiência</button>

      <label for="inputFoto">Foto</label>
      <input type="file" id="inputFoto" accept="image/*">

      <button type="button" id="baixarPDF">Baixar PDF</button>

      <button type="button" id="limpar">Limpar currículo</button>
    </form>

  </section>

<div class="previewcurriculo">

  <div class="folha pagina">

    <div class="header">

      <img id="previewFoto" src="https://via.placeholder.com/100" alt="foto do candidato">

      <div>

<h1 id="previewNome">Nome</h1>

<p id="previewCargo">Cargo</p>

<div class="links">

<a id="previewLinkedin">LinkedIn</a>

<a id="previewGitHub">GitHub</a>

<a id="previewEmail">Email</a>

<a id="previewNumero">Telefone</a>

</div>

</div>

</div>

<div class="tecnologias">

<h2>Tecnologias</h2>

<ul id="listaTecnologias"></ul>

</div>

<div class="experiencias">

<h2>Experiências</h2>

<ul id="listaExperiencias"></ul>

</div>

<div class="cursos">

<h2>Cursos</h2>

<ul id="listaCursos"></ul>

</div>


<div class="formacao">

<h2>Formação Acadêmica</h2>

<ul id="listaFormacao"></ul>

</div>

</div>

</div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="script.js"></script>

</body>

</html>
